<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock - Multi-Timezone</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>🕐 Digital Clock</h1>
        <div class="header-actions">
          <button class="btn btn-secondary" id="toggleFormatBtn" title="Toggle 12/24 hour format (T)">12/24 Format</button>
          <button class="btn btn-secondary" id="toggleThemeBtn" title="Toggle dark/light mode (D)">🌙 Dark Mode</button>
          <button class="btn btn-success" id="downloadBtn" title="Download clock as standalone file">⬇️ Download</button>
          <button class="btn btn-primary" id="addTimezoneBtn" title="Add a new timezone (A)">+ Add Timezone</button>
        </div>
      </div>
    </header>

    <!-- Main Clock Display -->
    <main class="main">
      <div class="current-time-section">
        <div class="current-time-card">
          <div class="time-header">
            <h2 id="currentTimeLocation">Local Time</h2>
            <p id="currentDateDisplay"></p>
          </div>
          <div class="current-time-display">
            <div class="time-large" id="currentTimeDisplay">00:00:00</div>
            <div class="time-period" id="timePeriod"></div>
          </div>
          <div class="time-info">
            <p id="dayDisplay"></p>
          </div>
        </div>
      </div>

      <!-- Timezones Grid -->
      <div class="timezones-section">
        <h2>Time Zones</h2>
        <div class="timezones-grid" id="timezonesContainer">
          <!-- Time zone cards will be inserted here -->
        </div>
        <div class="empty-state" id="emptyState" style="display: none;">
          <p>📍 No time zones added yet</p>
          <p>Click "+ Add Timezone" to get started</p>
        </div>
      </div>
    </main>

    <!-- Add Timezone Modal -->
    <div class="modal" id="addTimezoneModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Add Time Zone</h2>
          <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="search-box">
            <input 
              type="text" 
              id="timezoneSearch" 
              placeholder="Search time zones (e.g., Tokyo, Paris, New York)..."
              class="search-input"
            >
          </div>
          <div class="timezone-list" id="timezoneList">
            <!-- Time zones will be listed here -->
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Overlay -->
    <div class="modal-overlay" id="modalOverlay"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>💡 Keyboard shortcuts: <strong>T</strong> = Format, <strong>D</strong> = Dark mode, <strong>A</strong> = Add timezone, <strong>Esc</strong> = Close</p>
  </footer>

  <script src="js/clock.js"></script>
  <script>
    // Download button functionality
    document.getElementById('downloadBtn').addEventListener('click', downloadClock);

    function downloadClock() {
      // Get the full HTML content
      const htmlContent = getStandaloneHTML();
      
      // Create blob and download
      const blob = new Blob([htmlContent], { type: 'text/html' });
      const url = window.URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'digital-clock.html';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      window.URL.revokeObjectURL(url);
    }

    function updateTime() {
      const now = new Date();
      
      // Current time
      const localFormatter = new Intl.DateTimeFormat('en-US', {
        hour: is24HourFormat ? '2-digit' : 'numeric',
        minute: '2-digit',
        second: '2-digit',
        hour12: !is24HourFormat,
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
      });

      const timeString = localFormatter.format(now);
      currentTimeDisplay.textContent = timeString;

      // Date
      const dateFormatter = new Intl.DateTimeFormat('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      currentDateDisplay.textContent = dateFormatter.format(now);
      dayDisplay.textContent = dateFormatter.format(now).split(',')[0];

      // AM/PM
      const hour = now.getHours();
      timePeriod.textContent = is24HourFormat ? 'UTC' : (hour >= 12 ? 'PM' : 'AM');

      updateTimezoneCards();
    }

    function updateTimezoneCards() {
      timezonesContainer.innerHTML = '';

      if (selectedTimezones.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      selectedTimezones.forEach((tz, index) => {
        const now = new Date();
        const tzFormatter = new Intl.DateTimeFormat('en-US', {
          hour: is24HourFormat ? '2-digit' : 'numeric',
          minute: '2-digit',
          second: '2-digit',
          hour12: !is24HourFormat,
          timeZone: tz.tz
        });

        const timeString = tzFormatter.format(now);
        const offsetFormatter = new Intl.DateTimeFormat('en-US', {
          timeZoneName: 'longOffset',
          timeZone: tz.tz
        });
        const offsetString = offsetFormatter.format(now).split(' ').pop();

        const card = document.createElement('div');
        card.className = 'timezone-card';
        card.innerHTML = \`
          <button class="remove-btn" onclick="removeTimezone(\${index})">×</button>
          <h3>\${tz.name}</h3>
          <div class="timezone-time">\${timeString}</div>
          <div class="timezone-offset">\${offsetString}</div>
        \`;
        timezonesContainer.appendChild(card);
      });
    }

    function toggleFormat() {
      is24HourFormat = !is24HourFormat;
      toggleFormatBtn.textContent = is24HourFormat ? '24-Hour' : '12-Hour';
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.body.classList.toggle('dark-mode');
      toggleThemeBtn.textContent = isDarkMode ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    function openModal() {
      addTimezoneModal.classList.add('active');
      modalOverlay.classList.add('active');
      filterTimezones();
      timezoneSearch.focus();
    }

    function closeModal() {
      addTimezoneModal.classList.remove('active');
      modalOverlay.classList.remove('active');
      timezoneSearch.value = '';
    }

    function filterTimezones() {
      const searchTerm = timezoneSearch.value.toLowerCase();
      timezoneList.innerHTML = '';

      TIMEZONES.forEach(tz => {
        if (tz.name.toLowerCase().includes(searchTerm) || tz.tz.toLowerCase().includes(searchTerm)) {
          if (!selectedTimezones.find(t => t.tz === tz.tz)) {
            const item = document.createElement('div');
            item.className = 'timezone-item';
            item.innerHTML = \`
              <div class="timezone-item-name">\${tz.name}</div>
              <div class="timezone-item-offset">\${tz.tz}</div>
            \`;
            item.addEventListener('click', () => addTimezone(tz));
            timezoneList.appendChild(item);
          }
        }
      });

      if (timezoneList.children.length === 0) {
        timezoneList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No timezones found</div>';
      }
    }

    function addTimezone(tz) {
      selectedTimezones.push(tz);
      closeModal();
      updateTimezoneCards();
    }

    function removeTimezone(index) {
      selectedTimezones.splice(index, 1);
      updateTimezoneCards();
    }

    function handleKeyboard(e) {
      if (e.key === 't' || e.key === 'T') toggleFormat();
      if (e.key === 'd' || e.key === 'D') toggleTheme();
      if (e.key === 'a' || e.key === 'A') openModal();
      if (e.key === 'Escape') closeModal();
    }

    // Initialize
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>`;
    }
  </script>
</body>
</html>
